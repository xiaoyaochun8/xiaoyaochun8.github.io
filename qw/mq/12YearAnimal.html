<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<link rel="shortcut icon " href="1.png" type="image/png">
		<title>十二生肖</title>
		<style type="text/css">
			table {
				width: 100%; height: 700px;
			}
		</style>
	</head>
	<body>
		<table ontouchstart="setAnimal()">
			<tr>
				<td align="center" valign="middle">
					<img id="img">
				</td>
			</tr>
		</table>

		<script>
			var cnt = 1;
			function setAnimal(){
				if(cnt > 12){
					cnt = 1;
				}
				document.getElementById('img').src = cnt+".png";
				cnt++;
			}
			setAnimal();
		</script>
	</body>
</html>
