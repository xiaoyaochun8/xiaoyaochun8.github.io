<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,user-scalable=no"/> 
        <title>brwoerTB</title>
    </head>
    <body>
        
<script src="https://cdn.bootcss.com/jquery/3.2.1/jquery.js"></script>
<script>
  $(function(){
    var txt = '<table border=1>';
    txt += "<tr><td>Browser CodeName</td><td>" + navigator.appCodeName + "</td></tr>";
    txt += "<tr><td>Browser Name</td><td>" + navigator.appName + "</td></tr>";
    txt += "<tr><td>Browser Version</td><td>" + navigator.appVersion + "</td></tr>";
    txt += "<tr><td>Cookies Enabled</td><td>" + navigator.cookieEnabled + "</td></tr>";
    txt += "<tr><td>Platform</td><td>" + navigator.platform + "</td></tr>";
    txt += "<tr><td>User-agent header</td><td>" + navigator.userAgent + "</td></tr>";
    txt += "<tr><td>User-agent language</td><td>" + navigator.systemLanguage + "</td></tr>";
    txt += "</table>";
    $('div').html(txt);
    console.log(navigator);
  });
</script>
<div style=""></div>

    </body>
</html>
