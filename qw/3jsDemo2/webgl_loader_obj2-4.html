<!DOCTYPE html>
<html lang="en">
	<head>
		<title>World 3d - three.js webgl - loaders - OBJ loader</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	</head>

	<body>
		<div id="info">
		<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - OBJLoader test
		</div>

		<!-- Import maps polyfill -->
		<!-- Remove this when import maps will be widely supported -->
		<!-- <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script> -->

		<script type="importmap">
			{
				"imports": {
					"three": "./three.module.js"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import { OrbitControls } from './controls/OrbitControls.js';
			import { OBJLoader } from './loaders/OBJLoader.js';
			import { GLTFLoader } from './loaders/GLTFLoader.js';

			let container;

			let camera, scene, renderer;

			let mouseX = 0, mouseY = 0;

			let windowHalfX = window.innerWidth / 2;
			let windowHalfY = window.innerHeight / 2;

			let object;
			let object2;
			let object3;
			let object4;
			let object5;

			init();
			animate();


			function init() {

				container = document.createElement( 'div' );
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
				//模仿3d地图视角
				camera.position.x = 0;
				camera.position.y = 50;
				camera.position.z = 250;

				// scene

				scene = new THREE.Scene();

				const ambientLight = new THREE.AmbientLight( 0xcccccc, 0.2 );
				scene.add( ambientLight );

				const pointLight = new THREE.PointLight( 0xffffff, 1.0 );
				camera.add( pointLight );
				scene.add( camera );

				const axisHelper = new THREE.AxesHelper(100)
				scene.add(axisHelper)

				const grid = new THREE.GridHelper( 1000, 50 );
				//grid.setColors( 0x0000ff, 0x808080 );
				scene.add(grid);
				
				//

				function loadModel() {
					object.traverse( function ( child ) {
						if ( child.isMesh ) 
							child.material.map = texture;
					} );
					//scene.background = texture;
					object.position.x = 0;
					object.position.y = 0;
					object.position.z = 0;
					object.scale.x = 0.05;
					object.scale.y = 0.05;
					object.scale.z = 0.05;
					scene.add( object );
					
					object2.traverse( function ( child ) {
						if ( child.isMesh ) 
							child.material.map = texture;
					} );
					object2.position.x = - 175;
					object2.position.y = 30;
					object2.position.z = - 50;
					object2.scale.x = 0.03;
					object2.scale.y = 0.03;
					object2.scale.z = 0.03;
					scene.add( object2 );
					
					object3.traverse( function ( child ) {
						if ( child.isMesh ) 
							child.material.map = texture2;
					} );
					object3.position.x = - 150;
					object3.position.y = 50;
					object3.position.z = - 150;
					object3.scale.x = 0.5;
					object3.scale.y = 0.5;
					object3.scale.z = 0.5;
					scene.add( object3 );
					
					object4.traverse( function ( child ) {
						if ( child.isMesh ) 
							child.material.map = texture;
					} );
					object4.position.x = - 100;
					object4.position.y = 180;
					object4.position.z = - 250;
					object4.scale.x = 0.5;
					object4.scale.y = 0.5;
					object4.scale.z = 0.5;
					scene.add( object4 );
					
					object5.scene.traverse( function ( child ) {
						if ( child.isMesh ) 
							child.material.map = texture;
					} );
					object5.scene.position.x = 0;
					object5.scene.position.y = 210;
					object5.scene.position.z = - 350;
					object5.scene.scale.x = 30;
					object5.scene.scale.y = 30;
					object5.scene.scale.z = 30;
					scene.add( object5.scene );

				}
				const manager = new THREE.LoadingManager( loadModel );

				// texture
				const textureLoader = new THREE.TextureLoader( manager );
				const texture = textureLoader.load( 'textures/uv_grid_opengl.jpg' );
				
				const textureLoader2 = new THREE.TextureLoader( manager );
				const texture2 = textureLoader2.load( 'models/894.obj/3Dxy_Img/3Dxy_Img_1.png' );

				// model
				const loader = new OBJLoader( manager );
				loader.load( 'models/ketingshafa.obj/file.obj', function ( obj ) {
					object = obj;
					//scene.add( object );
				});
				const loader2 = new OBJLoader( manager );
				loader2.load( 'models/ketingshafa.obj/file.obj', function ( obj ) {
					object2 = obj;
				});
				const loader3 = new OBJLoader( manager );
				loader3.load( 'models/894.obj/file.obj', function ( obj ) {
					object3 = obj;
				});
				const loader4 = new OBJLoader( manager );
				loader4.load( 'models/j20.obj', function ( obj ) {
					object4 = obj;
				});
				const loader5 = new GLTFLoader( manager );
				loader5.load( 'models/scene.gltf', function ( gltf ) {
					object5 = gltf;
					//scene.add( object5.scene );
				} );
				
				
				// 【图片-纹理贴图-材质-几何体-网格】
				
				// 图片-纹理贴图
				const texture2 = new THREE.TextureLoader().load( 'textures/uv_grid_opengl.jpg' );
				texture2.wrapS = texture2.wrapT = THREE.RepeatWrapping;
				texture2.anisotropy = 16;
				
				// 纹理贴图-材质
				const material = new THREE.MeshPhongMaterial( { map: texture2, side: THREE.DoubleSide } );
				
				// [几何体+材质]-网格
				var objectX = new THREE.Mesh( new THREE.SphereGeometry( 75, 20, 10 ), material );
				objectX.position.set( -500, 0, -500 );
				scene.add( objectX );
				
				var objectX = new THREE.Mesh( new THREE.IcosahedronGeometry( 75, 1 ), material );
				objectX.position.set( 500, 0, -500 );
				scene.add( objectX );
				
				var objectX = new THREE.Mesh( new THREE.OctahedronGeometry( 75, 2 ), material );
				objectX.position.set( 500, 0, 500 );
				scene.add( objectX );
				
				var objectX = new THREE.Mesh( new THREE.TetrahedronGeometry( 75, 0 ), material );
				objectX.position.set( -500, 0, 500 );
				scene.add( objectX );
				
				var objectX = new THREE.Mesh( new THREE.PlaneGeometry( 100, 100, 4, 4 ), material );
				objectX.position.set( 0, 0, -500 );
				scene.add( objectX );
				
				var objectX = new THREE.Mesh( new THREE.BoxGeometry( 100, 100, 100, 4, 4, 4 ), material );
				objectX.position.set( 500, 0, 0 );
				scene.add( objectX );
				
				var objectX = new THREE.Mesh( new THREE.CircleGeometry( 50, 20, 0, Math.PI * 2 ), material );
				objectX.position.set( 0, 0, 500 );
				scene.add( objectX );
				
				var objectX = new THREE.Mesh( new THREE.RingGeometry( 10, 50, 20, 5, 0, Math.PI * 2 ), material );
				objectX.position.set( -500, 0, 0 );
				scene.add( objectX );
				
				var objectX = new THREE.Mesh( new THREE.CylinderGeometry( 25, 75, 100, 40, 5 ), material );
				objectX.position.set( -500, 0, 250 );
				scene.add( objectX );
				
				const points = [];
				for ( let i = 0; i < 50; i ++ ) {
					points.push( new THREE.Vector2( Math.sin( i * 0.2 ) * Math.sin( i * 0.1 ) * 15 + 50, ( i - 5 ) * 2 ) );
				}
				var objectX = new THREE.Mesh( new THREE.LatheGeometry( points, 20 ), material );
				objectX.position.set( -500, 0, -250 );
				scene.add( objectX );
				
				var objectX  = new THREE.Mesh( new THREE.TorusGeometry( 50, 20, 20, 20 ), material );
				objectX.position.set( 500, 0, 250 );
				scene.add( objectX );

				var objectX  = new THREE.Mesh( new THREE.TorusKnotGeometry( 50, 10, 50, 20 ), material );
				objectX.position.set( 500, 0, -250 );
				scene.add( objectX );

				//

				renderer = new THREE.WebGLRenderer();
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setClearColor(0xffffff, 1.0);
				container.appendChild( renderer.domElement );

				//

				const controls = new OrbitControls( camera, renderer.domElement );
				controls.addEventListener( 'change', render ); // use if there is no animation loop
				//controls.minDistance = 2;
				//controls.maxDistance = 10;
				//controls.target.set( 0, 0, - 0.2 );
				controls.update();
			}

			//

			function animate() {
				if(object){
					//object.rotation.y += 0.01;
					//object.scale.x += 0.01;
					//object.scale.y += 0.01;
					//object.scale.z += 0.01;
					//模仿3d地图移动
					//camera.position.z -= 0.3;
				}
				requestAnimationFrame( animate );
				render();
			}

			function render() {
				//是否始终看向原点000
				//camera.lookAt( scene.position );
				renderer.render( scene, camera );
			}
			
			var key = document.body;
			key.onkeydown =f;  //注册keydown事件处理函数
			//key.onkeyup = f;  //注册keyup事件处理函数
			//key.onkeypress = f;  //注册keypress事件处理函数
			function f (e) {
				var e = e || window.event;  //标准化事件处理
				//var s = e.type + " " + e.keyCode;  //获取键盘事件类型和按下的值
				//key.value = s;
				if(e.type == 'keydown'){
					//前进
					if(e.code == 'KeyW'){
						camera.position.z -= 0.3;
						camera.position.x -= camera.rotation.z;
					//后退
					}else if(e.code == 'KeyS'){
						camera.position.z += 0.3;
						camera.position.x += camera.rotation.z;
					//走左
					}else if(e.code == 'KeyA'){
						camera.position.x -= 0.3;
					//走右
					}else if(e.code == 'KeyD'){
						camera.position.x += 0.3;
					//左倾斜
					}else if(e.code == 'KeyQ'){
						camera.rotation.z += 0.003;
					//右倾斜
					}else if(e.code == 'KeyE'){
						camera.rotation.z -= 0.003;
					//上升
					}else if(e.code == 'ArrowUp'){
						camera.position.y += 0.3;
					//下降
					}else if(e.code == 'ArrowDown'){
						camera.position.y -= 0.3;
					//看左
					}else if(e.code == 'ArrowLeft'){
						camera.rotation.y += 0.003;
					//看右
					}else if(e.code == 'ArrowRight'){
						camera.rotation.y -= 0.003;
					}
				}
			}

		</script>
		

	</body>
</html>
