<!DOCTYPE html>
<html lang="en">
	<head>
		<title>World 2d - three.js webgl - loaders - OBJ loader</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	</head>

	<body>
		<div id="info">
		<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - OBJLoader test
		</div>

		<!-- Import maps polyfill -->
		<!-- Remove this when import maps will be widely supported -->
		<!-- <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script> -->

		<script type="importmap">
			{
				"imports": {
					"three": "./three.module.js"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import { OrbitControls } from './controls/OrbitControls.js';
			import { OBJLoader } from './loaders/OBJLoader.js';

			let container;

			let camera, scene, renderer;

			let mouseX = 0, mouseY = 0;

			let windowHalfX = window.innerWidth / 2;
			let windowHalfY = window.innerHeight / 2;

			let object;

			init();
			animate();


			function init() {

				container = document.createElement( 'div' );
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
				//模仿2d地图视角
				camera.position.x = 200;
				camera.position.y = 250;
				camera.position.z = 250;

				// scene

				scene = new THREE.Scene();

				const ambientLight = new THREE.AmbientLight( 0xcccccc, 0.2 );
				scene.add( ambientLight );

				const pointLight = new THREE.PointLight( 0xffffff, 1.0 );
				camera.add( pointLight );
				scene.add( camera );

				const axisHelper = new THREE.AxesHelper(100)
				scene.add(axisHelper)

				const grid = new THREE.GridHelper( 1000, 50 );
				//grid.setColors( 0x0000ff, 0x808080 );
				scene.add(grid);
				
				//

				function loadModel() {
					object.traverse( function ( child ) {
						if ( child.isMesh ) 
							child.material.map = texture;
					} );
					//scene.background = texture;
					//object.position.y = - 75;
					scene.add( object );

				}
				const manager = new THREE.LoadingManager( loadModel );

				// texture
				const textureLoader = new THREE.TextureLoader( manager );
				const texture = textureLoader.load( 'textures/uv_grid_opengl.jpg' );
				//const texture = textureLoader.load( 'textures/uv_grid_opengl.jpg' );

				// model
				const loader = new OBJLoader( manager );
				loader.load( 'models/ketingshafa.obj/file.obj', function ( obj ) {
					obj.scale.x = 0.05;
					obj.scale.y = 0.05;
					obj.scale.z = 0.05;
					object = obj;
					//scene.add( object );
				});
				
				const loader2 = new OBJLoader(  );
				loader2.load( 'models/ketingshafa.obj/file.obj', function ( obj ) {
					obj.scale.x = 0.05;
					obj.scale.y = 0.05;
					obj.scale.z = 0.05;
					obj.position.x = - 175;
					scene.add( obj );
				});

				//

				renderer = new THREE.WebGLRenderer();
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setClearColor(0xffffff, 1.0);
				container.appendChild( renderer.domElement );

				//

				const controls = new OrbitControls( camera, renderer.domElement );
				controls.addEventListener( 'change', render ); // use if there is no animation loop
				//controls.minDistance = 2;
				//controls.maxDistance = 10;
				//controls.target.set( 0, 0, - 0.2 );
				controls.update();
			}

			//

			function animate() {
				if(object){
					//object.rotation.y += 0.01;
					//object.scale.x += 0.01;
					//object.scale.y += 0.01;
					//object.scale.z += 0.01;
					//模仿2d地图移动
					//camera.position.z -= 1;
				}
				requestAnimationFrame( animate );
				render();
			}

			function render() {
				//是否始终看向原点000
				//camera.lookAt( scene.position );
				renderer.render( scene, camera );
			}
			
			var key = document.body;
			key.onkeydown =f;  //注册keydown事件处理函数
			key.onkeyup = f;  //注册keyup事件处理函数
			key.onkeypress = f;  //注册keypress事件处理函数
			function f (e) {
				var e = e || window.event;  //标准化事件处理
				var s = e.type + " " + e.keyCode;  //获取键盘事件类型和按下的值
				key.value = s;
				console.log(e)
				if(e.type == 'keydown'){
					//前进
					if(e.code == 'KeyW'){
						camera.position.z -= 3;
					//后退
					}else if(e.code == 'KeyS'){
						camera.position.z += 3;
					//走左
					}else if(e.code == 'KeyA'){
						camera.position.x -= 3;
					//走右
					}else if(e.code == 'KeyD'){
						camera.position.x += 3;
					}
				}
			}

		</script>

	</body>
</html>
