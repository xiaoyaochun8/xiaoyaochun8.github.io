			// 【图片-纹理贴图-材质-几何体-网格】
			
			// 图片-纹理贴图
			const texture2 = new THREE.TextureLoader().load( 'textures/uv_grid_opengl.jpg' );
			texture2.wrapS = texture2.wrapT = THREE.RepeatWrapping;
			texture2.anisotropy = 16;

			function initThree(){
				container = document.createElement( 'div' );
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1 );
				//模仿3d地图视角
				camera.position.x = 0;
				camera.position.y = 700;
				camera.position.z = 1350;

				// scene
				scene = new THREE.Scene();

				const ambientLight = new THREE.AmbientLight( 0xcccccc, 0.2 );
				scene.add( ambientLight );

				const pointLight = new THREE.PointLight( 0xffffff, 1.0 );
				camera.add( pointLight );
				scene.add( camera );

				// spotLight.position.set( 200, 50, 200 );
				// scene.add( spotLight );

				//grid.setColors( 0x0000ff, 0x808080 );
				//scene.add(grid);
			}

			//大地
			function initEarth(){
				//const texture = new THREE.TextureLoader().load( 'textures/world_a/earth.jpeg' );
				const texture = new THREE.TextureLoader().load( 'textures/uv_grid_opengl.jpg' );
				texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
				texture.anisotropy = 16;
				const material = new THREE.MeshPhongMaterial( { map: texture, side: THREE.DoubleSide } );

				var objectX = new THREE.Mesh( new THREE.PlaneGeometry( 1000, 1000, 4, 4 ), material );
				objectX.position.set( 0, 0, 0 );
				objectX.rotation.x = THREE.MathUtils.degToRad(90);
				scene.add( objectX );
			}

			//太阳
			function initSun(){
				const material = new THREE.MeshBasicMaterial( {color: 0xff0000, side: THREE.DoubleSide} );
				var objectX = new THREE.Mesh( new THREE.SphereGeometry( 20, 10, 10 ), material );
				objectX.position.set( -100, 300, 100 );
				scene.add( objectX );
			}

			//云朵
			function initYun(){

						materials.preload();

							.setMaterials( materials )

								object.scale.set( 20, 10, 20);
								object.position.set( -200, 200, -200 );
								scene.add( object );
							} );
					} );
			}

			function render() {
				//是否始终看向原点000
				//camera.lookAt( scene.position );
				renderer.render( scene, camera );
			}
			
			function initControl2(){
				var key = document.body;
				key.onkeydown =f;  //注册keydown事件处理函数
				//key.onkeyup = f;  //注册keyup事件处理函数
				//key.onkeypress = f;  //注册keypress事件处理函数
				function f (e) {
					var e = e || window.event;  //标准化事件处理
					//var s = e.type + " " + e.keyCode;  //获取键盘事件类型和按下的值
					//key.value = s;
					if(e.type == 'keydown'){
						//前进
						if(e.code == 'KeyW'){
							camera.position.z -= 0.3;
							camera.position.x -= camera.rotation.z;
						//后退
						}else if(e.code == 'KeyS'){
							camera.position.z += 0.3;
							camera.position.x += camera.rotation.z;
						//走左
						}else if(e.code == 'KeyA'){
							camera.position.x -= 0.3;
						//走右
						}else if(e.code == 'KeyD'){
							camera.position.x += 0.3;
						//左倾斜
						}else if(e.code == 'KeyQ'){
							camera.rotation.z += 0.003;
						//右倾斜
						}else if(e.code == 'KeyE'){
							camera.rotation.z -= 0.003;
						//上升
						}else if(e.code == 'ArrowUp'){
							camera.position.y += 0.3;
						//下降
						}else if(e.code == 'ArrowDown'){
							camera.position.y -= 0.3;
						//看左
						}else if(e.code == 'ArrowLeft'){
							camera.rotation.y += 0.003;
						//看右
						}else if(e.code == 'ArrowRight'){
							camera.rotation.y -= 0.003;
						}
					}
				}
			}
