<html lang="en">

	<body>

		<script type="module">

			import * as THREE from 'three';

			import { OrbitControls } from './controls/OrbitControls.js';
			import { OBJLoader } from './loaders/OBJLoader.js';
			import { GLTFLoader } from './loaders/GLTFLoader.js';
			import { MTLLoader } from './loaders/MTLLoader.js';

			let container;

			let camera, scene, renderer;

			let mouseX = 0, mouseY = 0;

			let windowHalfX = window.innerWidth / 2;
			let windowHalfY = window.innerHeight / 2;

			let object;
			let object2;
			let object3;
			let object4;
			let object5;

			init();
			animate();

			//大地
			function initEarth(){
				const texture = new THREE.TextureLoader().load( 'textures/world_a/earth.jpeg' );
				texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
				texture.anisotropy = 16;
				const material = new THREE.MeshPhongMaterial( { map: texture, side: THREE.DoubleSide } );

				var objectX = new THREE.Mesh( new THREE.PlaneGeometry( 1000, 1000, 4, 4 ), material );
				objectX.position.set( 0, 0, 0 );
				objectX.rotation.x = THREE.MathUtils.degToRad(90);
				scene.add( objectX );
			}

			//太阳
			function initSun(){
				const material = new THREE.MeshBasicMaterial( {color: 0xff0000, side: THREE.DoubleSide} );
				var objectX = new THREE.Mesh( new THREE.SphereGeometry( 20, 10, 10 ), material );
				objectX.position.set( -100, 300, 100 );
				scene.add( objectX );
			}

			//云朵
			function initClouds(){
				const material = new THREE.MeshBasicMaterial( {color: 0x00ffff, side: THREE.DoubleSide} );
				var objectX  = new THREE.Mesh( new THREE.TorusKnotGeometry( 20, 10, 50, 20 ), material );
				objectX.position.set( -200, 200, -200 );
				scene.add( objectX );
			}

			//麦田
			function initMaiTian(){
				new MTLLoader()
					.load( 'models/world_a/maitian/file.mtl', function ( materials ) {
						materials.preload();
						new OBJLoader()
							.setMaterials( materials )
							.load( 'models/world_a/maitian/file.obj', function ( object ) {
								object.scale.set( 200, 100, 200);
								object.position.set( -300, 0, 200 );
								scene.add( object );
							} );
					} );
			}

			//chitang
			function initChiTang(){
				// const materials = new THREE.MeshBasicMaterial( {color: 0x00ffff, side: THREE.DoubleSide} );
				// const texture = new THREE.TextureLoader().load( 'textures/world_a/earth.jpeg' );
				// new MTLLoader()
				// 	.load( 'models/world_a/chitang/obj.mtl', function ( materials ) {
				// 		materials.preload();
				// 		new OBJLoader()
				// 			.setMaterials( materials )
				// 			.load( 'models/world_a/chitang/obj.obj', function ( object ) {
				// 				// object.traverse( function ( child ) {
				// 				// 	if ( child.isMesh ) 
				// 				// 		child.material.map = texture;
				// 				// } );
				// 				//object.scale.set( 200, 100, 200);
				// 				object.position.set( 200, -70, 200 );
				// 				scene.add( object );
				// 			} );
				// 	} );



				const geometry = new THREE.CircleGeometry( 100, 32 );
				const material = new THREE.MeshBasicMaterial( { color: 0x0000ff } );
				const circle = new THREE.Mesh( geometry, material );
				circle.position.set( 200, 10, 200 );
				circle.rotation.x = THREE.MathUtils.degToRad(90);
				scene.add( circle );

				var objectX = new THREE.Mesh( new THREE.BoxGeometry( 200, 10, 200, 4, 4, 4 ), material );
				objectX.position.set( 200, 0, 200 );
				scene.add( objectX );

				new MTLLoader()
					.load( 'models/world_a/hehua2/file.mtl', function ( materials ) {
						materials.preload();
						new OBJLoader()
							.setMaterials( materials )
							.load( 'models/world_a/hehua2/file.obj', function ( object ) {
								object.scale.set( 0.05, 0.05, 0.05);
								object.position.set( 200, 0, 200 );
								scene.add( object );
							} );
					} );
			}

			//shu
			function initShu(){
				new MTLLoader()
					.load( 'models/world_a/shu/file.mtl', function ( materials ) {
						materials.preload();
						new OBJLoader()
							.setMaterials( materials )
							.load( 'models/world_a/shu/file.obj', function ( object ) {
								object.scale.set( 0.01, 0.01, 0.01);
								object.position.set( -400, 0, -400 );
								scene.add( object );
							} );
					} );
			}


			function init() {

				container = document.createElement( 'div' );
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1 );
				//模仿3d地图视角
				camera.position.x = 0;
				camera.position.y = 700;
				camera.position.z = 1350;

				// scene

				scene = new THREE.Scene();

				const ambientLight = new THREE.AmbientLight( 0xcccccc, 0.2 );
				scene.add( ambientLight );

				const pointLight = new THREE.PointLight( 0xffffff, 1.0 );
				camera.add( pointLight );
				scene.add( camera );

				// const spotLight = new THREE.SpotLight( 0xffffff );
				// spotLight.position.set( 200, 50, 200 );
				// scene.add( spotLight );

				const axisHelper = new THREE.AxesHelper(1000)
				scene.add(axisHelper)

				const grid = new THREE.GridHelper( 1000, 50 );
				//grid.setColors( 0x0000ff, 0x808080 );
				//scene.add(grid);
				
				//-------------------------------------------------------------------------------

				initEarth();
				initSun();
				initClouds();
				initMaiTian();
				initChiTang();
				initShu();

				function loadModel() {
					object5.scene.traverse( function ( child ) {
						if ( child.isMesh ) 
							child.material.map = texture;
					} );
					object5.scene.position.x = 0;
					object5.scene.position.y = 210;
					object5.scene.position.z = - 350;
					object5.scene.scale.x = 30;
					object5.scene.scale.y = 30;
					object5.scene.scale.z = 30;
					//scene.add( object5.scene );
				}
				const manager = new THREE.LoadingManager( loadModel );

				// texture
				const textureLoader = new THREE.TextureLoader( manager );
				const texture = textureLoader.load( 'textures/uv_grid_opengl.jpg' );
				
				const loader5 = new GLTFLoader( manager );
				loader5.load( 'models/scene.gltf', function ( gltf ) {
					object5 = gltf;
				} );
				
				
				// 【图片-纹理贴图-材质-几何体-网格】
				
				// 图片-纹理贴图
				const texture2 = new THREE.TextureLoader().load( 'textures/uv_grid_opengl.jpg' );
				texture2.wrapS = texture2.wrapT = THREE.RepeatWrapping;
				texture2.anisotropy = 16;

				
				// 纹理贴图-材质
				const material = new THREE.MeshPhongMaterial( { map: texture2, side: THREE.DoubleSide } );

				// [几何体+材质]-网格

				

				

				//小鸟
				var objectX  = new THREE.Mesh( new THREE.TorusKnotGeometry( 20, 10, 50, 20 ), material );
				objectX.position.set( 0, 100, -100 );
				scene.add( objectX );


				//左山脉
				var objectX = new THREE.Mesh( new THREE.ConeGeometry( 50, 100, 32 ), material );
				objectX.position.set( -500, 0, -500 );
				scene.add( objectX );
				var objectX = new THREE.Mesh( new THREE.ConeGeometry( 50, 100, 32 ), material );
				objectX.position.set( -400, 0, -500 );
				scene.add( objectX );
				var objectX = new THREE.Mesh( new THREE.ConeGeometry( 50, 100, 32 ), material );
				objectX.position.set( -300, 0, -500 );
				scene.add( objectX );

				

				//右山脉
				var objectX = new THREE.Mesh( new THREE.ConeGeometry( 50, 100, 32 ), material );
				objectX.position.set( 500, 0, -500 );
				scene.add( objectX );

				//房子
				var objectX = new THREE.Mesh( new THREE.BoxGeometry( 400, 100, 100, 4, 4, 4 ), material );
				objectX.position.set( 200, 0, -100 );
				scene.add( objectX );

				//小径
				var objectX = new THREE.Mesh( new THREE.PlaneGeometry( 50, 200, 4, 4 ), material );
				objectX.position.set( 100, 0, 100 );
				objectX.rotation.x = 90;
				scene.add( objectX );
				

				//廊桥
				const points = [];
				for ( let i = 0; i < 50; i ++ ) {
					points.push( new THREE.Vector2( Math.sin( i * 0.2 ) * Math.sin( i * 0.1 ) * 15 + 50, ( i - 5 ) * 2 ) );
				}
				var objectX = new THREE.Mesh( new THREE.LatheGeometry( points, 10 ), material );
				objectX.position.set( 300, 0, 0 );
				objectX.rotation.x = 90;
				scene.add( objectX );

				//竹林
				var objectX  = new THREE.Mesh( new THREE.TorusKnotGeometry( 20, 10, 50, 20 ), material );
				objectX.position.set( 300, 0, 150 );
				scene.add( objectX );


				//小猫
				var objectX  = new THREE.Mesh( new THREE.TorusKnotGeometry( 20, 10, 50, 20 ), material );
				objectX.position.set( 180, 0, 350 );
				scene.add( objectX );

				//儿童
				var objectX  = new THREE.Mesh( new THREE.TorusKnotGeometry( 20, 10, 50, 20 ), material );
				objectX.position.set( 100, 0, 250 );
				scene.add( objectX );

				
				//石头
				var objectX = new THREE.Mesh( new THREE.ConeGeometry( 50, 100, 32 ), material );
				objectX.position.set( -200, 0, 200 );
				scene.add( objectX );



				

				setInterval(function(){
					//objectX.rotation.x += 0.01;
					//console.log(objectX.rotation.x)
				},50)
					

				//-------------------------------------------------------------------------------

				renderer = new THREE.WebGLRenderer();
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setClearColor(0xffffff, 1.0);
				container.appendChild( renderer.domElement );

				//

				const controls = new OrbitControls( camera, renderer.domElement );
				controls.addEventListener( 'change', render ); // use if there is no animation loop
				//controls.minDistance = 2;
				//controls.maxDistance = 10;
				//controls.target.set( 0, 0, - 0.2 );
				controls.update();
			}

			//

			function animate() {
				if(object){
					//object.rotation.y += 0.01;
					//object.scale.x += 0.01;
					//object.scale.y += 0.01;
					//object.scale.z += 0.01;
					//模仿3d地图移动
					//camera.position.z -= 0.3;
				}
				requestAnimationFrame( animate );
				render();
			}

			function render() {
				//是否始终看向原点000
				//camera.lookAt( scene.position );
				renderer.render( scene, camera );
			}
			
			var key = document.body;
			key.onkeydown =f;  //注册keydown事件处理函数
			//key.onkeyup = f;  //注册keyup事件处理函数
			//key.onkeypress = f;  //注册keypress事件处理函数
			function f (e) {
				var e = e || window.event;  //标准化事件处理
				//var s = e.type + " " + e.keyCode;  //获取键盘事件类型和按下的值
				//key.value = s;
				if(e.type == 'keydown'){
					//前进
					if(e.code == 'KeyW'){
						camera.position.z -= 0.3;
						camera.position.x -= camera.rotation.z;
					//后退
					}else if(e.code == 'KeyS'){
						camera.position.z += 0.3;
						camera.position.x += camera.rotation.z;
					//走左
					}else if(e.code == 'KeyA'){
						camera.position.x -= 0.3;
					//走右
					}else if(e.code == 'KeyD'){
						camera.position.x += 0.3;
					//左倾斜
					}else if(e.code == 'KeyQ'){
						camera.rotation.z += 0.003;
					//右倾斜
					}else if(e.code == 'KeyE'){
						camera.rotation.z -= 0.003;
					//上升
					}else if(e.code == 'ArrowUp'){
						camera.position.y += 0.3;
					//下降
					}else if(e.code == 'ArrowDown'){
						camera.position.y -= 0.3;
					//看左
					}else if(e.code == 'ArrowLeft'){
						camera.rotation.y += 0.003;
					//看右
					}else if(e.code == 'ArrowRight'){
						camera.rotation.y -= 0.003;
					}
				}
			}

		</script>
		

	</body>
</html>
