<!DOCTYPE html>
<html lang="en">
	<head>

		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	</head>

	<body>
		<div id="info">
		<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - OBJLoader + MTLLoader test

		<!-- Import maps polyfill -->

		<script type="module">

			import * as THREE from 'three';

			import { OrbitControls } from './controls/OrbitControls.js';
			import { MTLLoader } from './loaders/MTLLoader.js';
			import { OBJLoader } from './loaders/OBJLoader.js';

			let container;

			let camera, scene, renderer;

			let mouseX = 0, mouseY = 0;

			let windowHalfX = window.innerWidth / 2;
			let windowHalfY = window.innerHeight / 2;

			let object;

			init();
			animate();


			function init() {

				container = document.createElement( 'div' );
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
				camera.position.z = 250;

				// scene

				scene = new THREE.Scene();

				const ambientLight = new THREE.AmbientLight( 0xffffff, 2.5 );
				scene.add( ambientLight );

				const pointLight = new THREE.PointLight( 0xffffff, 1.0 );
				camera.add( pointLight );
				scene.add( camera );
				
				//
				
			//	function loadModel() {
			//		object.traverse( function ( child ) {
			//			if ( child.isMesh ) 
			//				child.material.map = texture;
			//		} );
			//		//scene.background = texture;
			//		object.position.y = - 75;
			//		scene.add( object );
			//
			//	}
			//	const manager = new THREE.LoadingManager( loadModel );
			//
			//	// texture
			//	const textureLoader = new THREE.TextureLoader( manager );
			//	//const texture = textureLoader.load( 'textures/uv_grid_opengl.jpg' );
			//	const texture = textureLoader.load( 'models/894.obj/3Dxy_Img/3Dxy_Img_1.png' );
			//
			//	// model
			//	const loader = new OBJLoader( manager );
			//	loader.load( 'models/894.obj/file.obj', function ( obj ) {
			//		obj.scale.x = 0.5;
			//		obj.scale.y = 0.5;
			//		obj.scale.z = 0.5;
			//		object = obj;
			//		//scene.add( object );
			//	});
				
				
				
				new MTLLoader()
					.setPath( 'models/894.obj/' )
					.load( 'file.mtl', function ( materials ) {

						materials.preload();

						new OBJLoader()
							.setMaterials( materials )
							.setPath( 'models/894.obj/' )
							.load( 'file.obj', function ( object ) {

								object.position.y = - 95;
								scene.add( object );

							} );

					} );

				//

				renderer = new THREE.WebGLRenderer();
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setClearColor(0xffffff, 1.0);
				container.appendChild( renderer.domElement );

				//

				const controls = new OrbitControls( camera, renderer.domElement );
				controls.addEventListener( 'change', render ); // use if there is no animation loop
				//controls.minDistance = 2;
				//controls.maxDistance = 10;
				//controls.target.set( 0, 0, - 0.2 );
				controls.update();
			}

			//

			function animate() {
				if(object){
					//object.rotation.y += 0.01;
					//object.scale.x += 0.01;
					//object.scale.y += 0.01;
					//object.scale.z += 0.01;
				}
				requestAnimationFrame( animate );
				render();
			}

			function render() {
				camera.lookAt( scene.position );
				renderer.render( scene, camera );
			}

		</script>

	</body>
</html>
