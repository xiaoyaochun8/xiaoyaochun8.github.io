<!DOCTYPE html>
<html>
	<head>
        <!--<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">-->
	<meta charset="UTF-8">
	<title>demo3D-地型图-建筑图-飞越</title>
	<script src="three.js"></script>
	<script src="stats.js"></script>
	<style type="text/css">
		div#canvas-frame {
			border: none;
			cursor: pointer;
			width: 100%;
			height: 600px;
			background-color: #EEEEEE;
		}
		button {
			width: 60px;
			height: 60px;
		}
	</style>
	</head>
	<style>
	table {margin:0 auto;width:50%}
	</style>
	<body onload="threeStart();">
	<div id="canvas-frame"></div>
        <table border="0">
	<tr>
                <td><button onclick="moveToRight()">平移地图</button></td>
                <td><button onclick="moveToBack()">飞越地图</button></td>
		<td><button onclick="moveToBack2()">飞越地图2</button></td>
		<td><button onclick="roundEarth()">顶部旋转地图</button></td>
		</tr>
	<tr>
                <td colspan="6">&nbsp;</td>
	</tr>
	<tr>
		<td><button onclick="moveObj('mesh','a')">cube向前旋转</button></td>
		<td><button onclick="moveObj('mesh','b')">cube向后旋转</button></td>
		<td><button onclick="moveObj('mesh','c')">cube向右旋转</button></td>
		<td><button onclick="moveObj('mesh','d')">cube向左旋转</button></td>
		<td><button onclick="moveObj('mesh','e')">cube逆时针旋转</button></td>
		<td><button onclick="moveObj('mesh','f')">cube顺时针旋转</button></td>
	</tr>
	<tr>
		<td colspan="6">&nbsp;</td>
	</tr>
	<tr>
		<td><button onclick="moveObj('camera','up')">抬头</button></td>
		<td><button onclick="moveObj('camera','down')">低头</button></td>
		<td><button onclick="moveObj('camera','left')">看左边</button></td>
		<td><button onclick="moveObj('camera','right')">看右边</button></td>
		<td><button onclick="moveObj('camera','backward')">瞻前</button></td>
		<td><button onclick="moveObj('camera','forward')">顾后</button></td>
	</tr>
	<tr>
		<td colspan="6">&nbsp;</td>
	</tr>
	<tr>
		<td colspan="1"><button onclick="stopMoveObj()">stop</button></td>
		<td colspan="1"><button onclick="resetObjs()">reset</button></td>
	</tr>
        </table>
        <script src="demo-map2-init.js"></script>
	<script src="demo-map2-logic.js"></script>
	</body>
</html>
