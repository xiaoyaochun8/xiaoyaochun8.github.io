<!DOCTYPE html>
<html>
    <head>
    <!--<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">-->
    <meta charset="UTF-8">
    <title>demo3D-地型图-建筑图-多视角</title>
    <script src="three.js"></script>
    <script src="stats.js"></script>
    <style type="text/css">
        * {margin:0;padding:0}
        div#canvas-frame {
            border: none;
            cursor: pointer;
            width: 100%;
            height: 700px;
            background-color: #EEEEEE;
        }
        button {
            width: 60px;
            height: 40px;
        }
        table {
            position:absolute;
            margin-top:-700px;
            width:100%;
        }
        ul {
            list-style:none;
        }
    </style>
    </head>
    <body onload="threeStart();">
    <div id="canvas-frame"></div>
    <table>
        <tr>
            <td align="left">
                <ul>
                    <li><button onclick="setView('top')">顶部视图</button></li>
                    <li><button onclick="setView('bottom')">底部视图</button></li>
                    <li><button onclick="setView('front')">前部视图</button></li>
                    <li><button onclick="setView('back')">后部视图</button></li>
                    <li><button onclick="setView('backTurnAround')">后部上下颠倒视图</button></li>
                    <li><button onclick="moveObj('mesh','a')">cube向前旋转</button></li>
                    <li><button onclick="moveObj('mesh','b')">cube向后旋转</button></li>
                    <li><button onclick="moveObj('mesh','c')">cube向右旋转</button></li>
                    <li><button onclick="moveObj('mesh','d')">cube向左旋转</button></li>
                    <li><button onclick="moveObj('mesh','e')">cube逆时针旋转</button></li>
                    <li><button onclick="moveObj('mesh','f')">cube顺时针旋转</button></li>
                </ul>
            </td>
            <td align="right">
                <ul>
                    <li><button onclick="moveToRight()">平移地图</button></li>
                    <li><button onclick="moveToBack()">飞越地图</button></li>
                    <li><button onclick="moveToBack2()">飞越地图2</button></li>
                    <li><button onclick="roundEarth()">顶部旋转地图</button></li>
                    <li><button onclick="moveObj('camera','up')">抬头</button></li>
                    <li><button onclick="moveObj('camera','down')">低头</button></li>
                    <li><button onclick="moveObj('camera','left')">看左边</button></li>
                    <li><button onclick="moveObj('camera','right')">看右边</button></li>
                    <li><button onclick="moveObj('camera','backward')">瞻前</button></li>
                    <li><button onclick="moveObj('camera','forward')">顾后</button></li>
                    <li colspan="1"><button onclick="stopMoveObj()">stop</button></li>
                    <li colspan="1"><button onclick="resetObjs()">reset</button></li>
                </ul>
            </td>
        </tr>
    </table>
    <script src="demo-map2-init.js"></script>
    <script src="demo-map2-logic.js"></script>
    </body>
</html>
