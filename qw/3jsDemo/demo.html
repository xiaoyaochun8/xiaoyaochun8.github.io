<!DOCTYPE html>
<html>
	<head>
        <!--<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">-->
		<meta charset="UTF-8">
		<title>demo3D-移动</title>
		<script src="three.js"></script>
        <script src="stats.js"></script>
		<style type="text/css">
			div#canvas-frame {
				border: none;
				cursor: pointer;
				width: 100%;
				height: 600px;
				background-color: #EEEEEE;
			}

		</style>
		<script>
            var renderer;
            var stats;
            function initThree() {
                width = document.getElementById('canvas-frame').clientWidth;
                height = document.getElementById('canvas-frame').clientHeight;
                renderer = new THREE.WebGLRenderer({
                    antialias : true
                });
                renderer.setSize(width, height);
                document.getElementById('canvas-frame').appendChild(renderer.domElement);
                renderer.setClearColor(0xFFFFFF, 1.0);

                //stats = new Stats();
                //stats.domElement.style.position = 'absolute';
                //stats.domElement.style.left = '0px';
                //stats.domElement.style.top = '0px';
                //document.getElementById('canvas-frame').appendChild(stats.domElement);
            }

            var camera;
            function initCamera() {
                camera = new THREE.PerspectiveCamera(45, width / height, 1, 10000);
                camera.position.x = 100;
                camera.position.y = 100;
                camera.position.z = 1000;
                camera.up.x = 0;
                camera.up.y = 0;
                camera.up.z = 0;//1;
                camera.lookAt({
                    x : 0,
                    y : 0,
                    z : 0
                });
            }

            var scene;
            function initScene() {
                scene = new THREE.Scene();
            }

            var light;
            function initLight() {
                light = new THREE.DirectionalLight(0xFF0000, 1.0, 0);
                light.position.set(100, 100, 200);
                scene.add(light);
            }

            var cube;
            function initDemoLine() {

                var geometry = new THREE.Geometry();
                var material = new THREE.LineBasicMaterial( { vertexColors: true } );
                var color1 = new THREE.Color( 0x444444 ), color2 = new THREE.Color( 0xFF0000 );

                // 线的材质可以由2点的颜色决定
                var p1 = new THREE.Vector3( -100, 0, 100 );
                var p2 = new THREE.Vector3(  100, 0, -100 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );

                var line = new THREE.Line( geometry, material, THREE.LinePieces );
                scene.add(line);
            }
            function initPOSLine() {

                var geometry = new THREE.Geometry();
                var material = new THREE.LineBasicMaterial( { vertexColors: true } );
                var color1 = new THREE.Color( 0x000000 ), color2 = new THREE.Color( 0x000000 );

                //x
                var p1 = new THREE.Vector3( 0, 0, 0 );
                var p2 = new THREE.Vector3(  300, 0, 0 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );
                //x arrow up
                var p1 = new THREE.Vector3( 280, 20, 0 );
                var p2 = new THREE.Vector3(  300, 0, 0 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );
                //x arrow down
                var p1 = new THREE.Vector3( 280, -20, 0 );
                var p2 = new THREE.Vector3(  300, 0, 0 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );
                //y
                var p1 = new THREE.Vector3( 0, 0, 0 );
                var p2 = new THREE.Vector3(  0, 250, 0 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );
                //y arrow left
                var p1 = new THREE.Vector3( -20, 230, 0 );
                var p2 = new THREE.Vector3(  0, 250, 0 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );
                //y arrow right
                var p1 = new THREE.Vector3( 20, 230, 0 );
                var p2 = new THREE.Vector3(  0, 250, 0 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );
                //z
                var p1 = new THREE.Vector3( 0, 0, 0 );
                var p2 = new THREE.Vector3(  0, 0, 600 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );
                //z arrow left
                var p1 = new THREE.Vector3( -20, 0, 580 );
                var p2 = new THREE.Vector3(  0, 0, 600 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );
                //z arrow right
                var p1 = new THREE.Vector3( 20, 0, 580 );
                var p2 = new THREE.Vector3(  0, 0, 600 );
                geometry.vertices.push(p1);
                geometry.vertices.push(p2);
                geometry.colors.push( color1, color2 );

                var line = new THREE.Line( geometry, material, THREE.LinePieces );
                scene.add(line);
            }
            var cube;
            var mesh;
            function initCube() {
               
                var geometry = new THREE.BoxGeometry( 100, 100, 100 );
                
                for ( var i = 0; i < geometry.faces.length; i += 2 ) {

                    var hex = Math.random() * 0xffffff;
                    geometry.faces[ i ].color.setHex( hex );
                    geometry.faces[ i + 1 ].color.setHex( hex );

                }
                
                var material = new THREE.MeshBasicMaterial( { vertexColors: THREE.FaceColors} );
                mesh = new THREE.Mesh( geometry,material);
                mesh.position = new THREE.Vector3(0,0,0);
                scene.add(mesh);
                
                
            }
            function initGrid(){
                var helper = new THREE.GridHelper( 1000, 50 );
                //helper.setColors( 0x0000ff, 0x808080 );
                scene.add( helper );
            }
            function threeStart() {
                initThree();
                initCamera();
                initScene();
                initLight();
                initDemoLine();
                initCube();
                initGrid();
                initPOSLine();
                animation();
                //renderer.clear();
                //renderer.render(scene, camera);

            }
            var stop = true;
            function animation()
            {
                //renderer.clear();
                //camera.position.x =camera.position.x +1;
                //mesh.position.x-=1;
                //camera.position.x+=1;
                if(!stop){
                    doMoveObj();
                }
                renderer.render(scene, camera);
                requestAnimationFrame(animation);

                //stats.update();
            }
            var currObj = mesh;
            var currType = 'left';
            function moveObj(obj,type){
                stop = false;
                currObj = obj;
                currType = type;
            }
            function stopMoveObj(){
                stop = true;
            }
            function resetObjs(){
                stop = true;
                mesh.position.x=0;
                mesh.position.y=0;
                mesh.position.z=0;
                camera.position.x = 100;
                camera.position.y = 100;
                camera.position.z = 1000;
            }
            function doMoveObj(){
                var obj = currObj;
                var type = currType;
                //i()
                if(obj == 'mesh'){
                    if(type == 'up'){
                        mesh.position.y+=1;
                    }else if(type == 'down'){
                        mesh.position.y-=1;
                    }else if(type == 'left'){
                        mesh.position.x-=1;
                    }else if(type == 'right'){
                        mesh.position.x+=1;
                    }else if(type == 'forward'){
                        mesh.position.z+=3;
                    }else if(type == 'backward'){
                        mesh.position.z-=3;
                    }
                }else if(obj == 'camera'){
                    if(type == 'up'){
                        camera.position.y+=1;
                    }else if(type == 'down'){
                        camera.position.y-=1;
                    }else if(type == 'left'){
                        camera.position.x-=1;
                    }else if(type == 'right'){
                        camera.position.x+=1;
                    }else if(type == 'forward'){
                        camera.position.z+=3;
                    }else if(type == 'backward'){
                        camera.position.z-=3;
                    }
                }
            }
		</script>
	</head>

	<body onload="threeStart();">
		<div id="canvas-frame"></div>
        <table border="0">
            <tr>
                <td><button onclick="moveObj('mesh','up')">cube上</button></td>
                <td><button onclick="moveObj('mesh','down')">cube下</button></td>
                <td><button onclick="moveObj('mesh','left')">cube左</button></td>
                <td><button onclick="moveObj('mesh','right')">cube右</button></td>
                <td><button onclick="moveObj('mesh','forward')">cube前</button></td>
                <td><button onclick="moveObj('mesh','backward')">cube后</button></td>
            </tr>
            <tr>
                <td colspan="6">&nbsp;</td>
            </tr>
            <tr>
                <td><button onclick="moveObj('camera','up')">camera上</button></td>
                <td><button onclick="moveObj('camera','down')">camera下</button></td>
                <td><button onclick="moveObj('camera','left')">camera左</button></td>
                <td><button onclick="moveObj('camera','right')">camera右</button></td>
                <td><button onclick="moveObj('camera','forward')">camera前</button></td>
                <td><button onclick="moveObj('camera','backward')">camera后</button></td>
            </tr>
            <tr>
                <td colspan="6">&nbsp;</td>
            </tr>
            <tr>
                <td colspan="1"><button onclick="stopMoveObj()">stop</button></td>
                <td colspan="1"><button onclick="resetObjs()">reset</button></td>
            </tr>
        </table>
