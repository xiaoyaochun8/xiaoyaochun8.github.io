<!DOCTYPE html>
<html>
	<head>
        <!--<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">-->
		<meta charset="UTF-8">
		<title>demo3D-two object旋转</title>
		<script src="three.js"></script>
    <script src="stats.js"></script>
		<style type="text/css">
			div#canvas-frame {
				border: none;
				cursor: pointer;
				width: 100%;
				height: 600px;
				background-color: #EEEEEE;
			}

		</style>
	</head>
    <style>
        table {margin:0 auto;width:40%}
    </style>
	<body onload="threeStart();">
		<div id="canvas-frame"></div>
        <table border="0">
            <tr>
                <td><button onclick="moveObj('mesh','a')">cube向前旋转</button></td>
                <td><button onclick="moveObj('mesh','b')">cube向后旋转</button></td>
                <td><button onclick="moveObj('mesh','c')">cube向右旋转</button></td>
                <td><button onclick="moveObj('mesh','d')">cube向左旋转</button></td>
                <td><button onclick="moveObj('mesh','e')">cube逆时针旋转</button></td>
                <td><button onclick="moveObj('mesh','f')">cube顺时针旋转</button></td>
            </tr>
            <tr>
                <td colspan="6">&nbsp;</td>
            </tr>
            <tr>
                <td><button onclick="moveObj('camera','up')">camera旋转视角抬高</button></td>
                <td><button onclick="moveObj('camera','down')">camera旋转视角降低</button></td>
                <td><button onclick="moveObj('camera','right')">camera旋转视角右移</button></td>
                <td><button onclick="moveObj('camera','left')">camera旋转视角左移</button></td>
                <td><button onclick="moveObj('camera','backward')">camera视角后移</button></td>
                <td><button onclick="moveObj('camera','forward')">camera视角前移</button></td>
            </tr>
            <tr>
                <td colspan="6">&nbsp;</td>
            </tr>
            <tr>
                <td colspan="1"><button onclick="stopMoveObj()">stop</button></td>
                <td colspan="1"><button onclick="resetObjs()">reset</button></td>
            </tr>
        </table>
        <script src="demo3.js"></script>
	</body>
</html>
