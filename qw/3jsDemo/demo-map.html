<!DOCTYPE html>
<html>
	<head>
        <!--<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">-->
	<meta charset="UTF-8">
	<title>demo3D-map-多cube</title>
	<script src="three.js"></script>
	<script src="stats.js"></script>
	<style type="text/css">
		div#canvas-frame {
			border: none;
			cursor: pointer;
			width: 100%;
			height: 600px;
			background-color: #EEEEEE;
		}
	</style>
	</head>
	<style>
	table {margin:0 auto;width:50%}
	.top {border:solid 1px red;border-buttom:none}
	.buttom {border:solid 1px red;border-top:none}
	</style>
	<body onload="threeStart();">
	<div id="canvas-frame"></div>
        <table border="0">
            <tr>
                <td></td>
                <td><button onclick="moveObj('camera','goforward')">向前进</button></td>
                <td></td>
                <td></td>
                <td><button onclick="moveObj('camera','up')">看天上</button></td>
                <td></td>
            </tr>
            <tr>
                <td><button onclick="moveObj('camera','goleft')">左移位</button></td>
                <td><button onclick="moveObj('camera','gobackward')">向后退</button></td>
                <td><button onclick="moveObj('camera','goright')">右移位</button></td>
                <td><button onclick="moveObj('camera','left')">看左边</button></td>
                <td><button onclick="moveObj('camera','down')">看脚下</button></td>
                <td><button onclick="moveObj('camera','right')">看右边</button></td>
            </tr>
            <tr>
                <td colspan="6">&nbsp;</td>
            </tr>
            <tr>
                <td><button onclick="moveObj('camera','backward')">看附近</button></td>
                <td><button onclick="moveObj('camera','forward')">看远方</button></td>
                <td></td>
            </tr>
            <tr>
                <td><button onclick="moveObj('camera','standup')">站起来</button></td>
                <td><button onclick="moveObj('camera','sitdown')">坐下去</button></td>
                <td></td>
            </tr>
            <tr>
                <td colspan="6">&nbsp;</td>
            </tr>
            <tr>
                <td colspan="1"><button onclick="stopMoveObj()">stop</button></td>
                <td colspan="1"><button onclick="resetObjs()">reset</button></td>
                <td></td>
            </tr>
        </table>
        <script src="demo-map.js"></script>
	</body>
</html>
