<html lang="zh-CN">
<head>
<title>CAIPU</title>
<script src="https://code.jquery.com/jquery-3.4.1.js"></script>
</head>
<body>
<ul>
</ul>
<script>
function setHtml(){
  var url = location.href + 'data.json';
  $.get(url,callBack);
  function callBack(response){
    var html = '';
    var searchEngine = 'https://www.baidu.com/s?wd=';
    for(var i in response.content){
      html += '<li><a target="_blank" href="'+searchEngine+response.content[i]+'">'+response.content[i]+'</a></li>';
    }
    $('ul').html(html);
  }
}
setHtml();
</script>
</body>
</html>
