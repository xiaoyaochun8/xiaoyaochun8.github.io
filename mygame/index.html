<!doctype html>
<html font-size="62.5%">

    <style>

            background:lavender;
            height:100vh;

            display:flex;

            border:dotted 1px lightgray;
            margin:1rem auto;
            background:#e3fae7;
            display:flex;
            justify-content: space-around;

        }
        .list {
            border:dotted 1px lightgray;
            margin:3rem auto;
            background:#e3fae7;
            display:flex;
            justify-content: space-around;
            flex-direction: row;
            flex-wrap: wrap;
        }
        .list .item {
            border:dotted 1px lightgray;
            height:2rem;
            text-align:center;
            background:#afbee7;
            cursor:pointer;
            display:flex;

    <script>

        function goTo3(name){
