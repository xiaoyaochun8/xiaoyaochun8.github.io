<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0d5c 0%, #0f3460 50%, #b91d5e 100%);
            background-attachment: fixed;
            color: #fff;
            padding: 20px 12px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            display: inline-block;
        }

        .header .time {
            display: inline-block;
            margin-left: 8px;
            vertical-align: top;
            margin-top: 6px;
        }

        .time .time-text {
            font-size: 20px;
            font-weight: 500;
            display: block;
        }

        .time .date-text {
            font-size: 13px;
            opacity: 0.8;
            display: block;
        }

        .app-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* 响应式网格：自动适配列数 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .app-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.95);
            color: #222;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s ease;
            text-decoration: none;
            cursor: pointer;
        }
		.app-card.no-open{
			pointer-events: none; /* 禁止点击 */
			cursor: default;      /* 鼠标变回普通样式 */
		}

        .app-card:hover {
            transform: translateY(-3px);
        }

        .app-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .app-card.bilibili { background-color: #f48fb1; }
        .app-card.jellyfin { background-color: #81b1e0; }
        .app-card.ikuai { background-color: #ffffff; }
        .app-card.navidrome { background-color: #639df0; }
        .app-card.ubuntu { background-color: #ffffff; }

        .app-card.vscode { background-color: #ffffff; }
        .app-card.xunlei { background-color: #ffffff; }
        .app-card.windows { background-color: #ffffff; }
        .app-card.wechat { background-color: #66bb6a; color: white; }
        .app-card.qq { background-color: #ffffff; }

        .app-card.openwrt { background-color: #ffffff; }
        .app-card.blog { background-color: #ffffff; }
        .app-card.portainer { background-color: #81c5f0; }
        .app-card.jd { background-color: #e53935; color: white; }
        .app-card.postgres { background-color: #ffffff; }

        .app-card.sunpanel { background-color: #b2dfdb; }
        .app-card.nextcloud { background-color: #ffffff; }
        .app-card.nginx { background-color: #66a766; color: white; }
        .app-card.docker { background-color: #ffffff; }
        .app-card.homeassistant { background-color: #ffffff; }

        .icon-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        /* 移动端适配侧边按钮 */
        .sidebar {
            position: fixed;
            right: 12px;
            bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 6px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        /* 小屏幕手机优化 */
        @media (max-width: 400px) {
            .app-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

    <script>
        // 动态时间日期
        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('timeText').textContent = `${hours}:${minutes}`;

            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const week = ['日', '一', '二', '三', '四', '五', '六'][now.getDay()];
            document.getElementById('dateText').textContent = `${month}-${day} 星期${week}`;
        }

        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
