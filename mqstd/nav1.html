<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叽里咕噜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0d5c 0%, #0f3460 50%, #b91d5e 100%);
            background-attachment: fixed;
            color: #fff;
            padding: 20px 12px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            display: inline-block;
        }

        .time {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .time .time-text {
            font-size: 20px;
            font-weight: 500;
            display: block;
        }

        .time .date-text {
            font-size: 13px;
            opacity: 0.8;
            display: block;
        }

        /* 表盘时钟样式 */
        .clock {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.8);
            position: relative;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .clock-face {
            position: relative;
            width: 100%;
            height: 100%;
            transform: translateY(-3px); /* 调整指针居中 */
        }

        .clock-mark {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }

        .clock-mark::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 1px;
        }

        /* 12个小时刻度 */
        .clock-mark:nth-child(1) { transform: translateX(-50%) rotate(0deg); }
        .clock-mark:nth-child(2) { transform: translateX(-50%) rotate(30deg); }
        .clock-mark:nth-child(3) { transform: translateX(-50%) rotate(60deg); }
        .clock-mark:nth-child(4) { transform: translateX(-50%) rotate(90deg); }
        .clock-mark:nth-child(5) { transform: translateX(-50%) rotate(120deg); }
        .clock-mark:nth-child(6) { transform: translateX(-50%) rotate(150deg); }
        .clock-mark:nth-child(7) { transform: translateX(-50%) rotate(180deg); }
        .clock-mark:nth-child(8) { transform: translateX(-50%) rotate(210deg); }
        .clock-mark:nth-child(9) { transform: translateX(-50%) rotate(240deg); }
        .clock-mark:nth-child(10) { transform: translateX(-50%) rotate(270deg); }
        .clock-mark:nth-child(11) { transform: translateX(-50%) rotate(300deg); }
        .clock-mark:nth-child(12) { transform: translateX(-50%) rotate(330deg); }

        /* 指针样式 */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 3px;
            background: white;
        }

        .hour-hand {
            width: 3px;
            height: 20px;
            background: rgba(255, 255, 255, 0.9);
        }

        .min-hand {
            width: 2px;
            height: 28px;
            background: rgba(255, 255, 255, 0.8);
        }

        .sec-hand {
            width: 1px;
            height: 32px;
            background: #ff4757;
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff4757;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .app-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* 响应式网格：自动适配列数 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .app-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.95);
            color: #222;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s ease;
            text-decoration: none;
            cursor: pointer;
        }
        .app-card.no-open{
            pointer-events: none; /* 禁止点击 */
            cursor: default;      /* 鼠标变回普通样式 */
        }

        .app-card:hover {
            transform: translateY(-3px);
        }

        .app-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .app-card.bilibili { background-color: #f48fb1; }
        .app-card.jellyfin { background-color: #81b1e0; }
        .app-card.ikuai { background-color: #ffffff; }
        .app-card.navidrome { background-color: #639df0; }
        .app-card.ubuntu { background-color: #ffffff; }

        .app-card.vscode { background-color: #ffffff; }
        .app-card.xunlei { background-color: #ffffff; }
        .app-card.windows { background-color: #ffffff; }
        .app-card.wechat { background-color: #66bb6a; color: white; }
        .app-card.qq { background-color: #ffffff; }

        .app-card.openwrt { background-color: #ffffff; }
        .app-card.blog { background-color: #ffffff; }
        .app-card.portainer { background-color: #81c5f0; }
        .app-card.jd { background-color: #e53935; color: white; }
        .app-card.postgres { background-color: #ffffff; }

        .app-card.sunpanel { background-color: #b2dfdb; }
        .app-card.nextcloud { background-color: #ffffff; }
        .app-card.nginx { background-color: #66bb6a; color: white; }
        .app-card.docker { background-color: #ffffff; }
        .app-card.homeassistant { background-color: #ffffff; }

        .icon-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        /* 移动端适配侧边按钮 */
        .sidebar {
            position: fixed;
            right: 12px;
            bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 6px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        /* 小屏幕手机优化 */
        @media (max-width: 400px) {
            .app-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header h1 {
                font-size: 26px;
            }
            .clock {
                width: 60px;
                height: 60px;
            }
            .hour-hand {
                height: 15px;
            }
            .min-hand {
                height: 20px;
            }
            .sec-hand {
                height: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>叽里咕噜 |</h1>
            <div class="time">
                <div class="digital-time">
                    <span class="time-text" id="timeText">15:48:00</span>
                    <span class="date-text" id="dateText">11-28 星期二</span>
                </div>
                <!-- 表盘时钟 -->
                <div class="clock">
                    <!-- 12个小时刻度 -->
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    <div class="clock-mark"></div>
                    
                    <div class="clock-face">
                        <div class="hand hour-hand" id="hourHand"></div>
                        <div class="hand min-hand" id="minHand"></div>
                        <div class="hand sec-hand" id="secHand"></div>
                        <div class="clock-center"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-section">
            <h2>APP</h2>
            <div class="app-grid">
                <!-- 第一行 -->
                <a href="yunmu.html" target="_blank" class="app-card bilibili">
                    <div class="app-icon">
                        <div class="icon-placeholder" style="background: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23fff\'><path d=\'M19.198 6.134C21.403 7.605 23 9.906 23 12.5c0 2.594-1.597 4.895-3.802 6.366L21 22H3l1.802-3.134C2.597 17.395 1 15.094 1 12.5c0-2.594 1.597-4.895 3.802-6.366L3 2h18l-1.802 4.134zM7 10v4h2v-4H7zm8 0v4h2v-4h-2z\'/></svg>') center/contain no-repeat;"></div>
                    </div>
                    <span>韵母拖拖拖</span>
                </a>

                <a href="math.html" target="_blank" class="app-card jellyfin">
                    <div class="app-icon">
                        <div class="icon-placeholder" style="background: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23fff\'><path d=\'M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18l7 3.5v6.84l-7 3.5-7-3.5V7.68l7-3.5z\'/></svg>') center/contain no-repeat;"></div>
                    </div>
                    <span>数学小恐龙</span>
                </a>

                <!-- 其他APP卡片保持不变 -->
                <!-- 注释掉的部分省略 -->
            </div>
        </div>
    </div>

    <div class="sidebar">
        <button class="sidebar-btn">+</button>
        <button class="sidebar-btn">🌐</button>
        <button class="sidebar-btn" onclick="location.reload()">⟳</button>
        <button class="sidebar-btn">⚙</button>
    </div>

    <script>
        // 获取指针元素
        const hourHand = document.getElementById('hourHand');
        const minHand = document.getElementById('minHand');
        const secHand = document.getElementById('secHand');

        // 动态时间日期和时钟指针
        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // 更新数字时间
            document.getElementById('timeText').textContent = `${hours}:${minutes}:${seconds}`;

            // 更新日期
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const week = ['日', '一', '二', '三', '四', '五', '六'][now.getDay()];
            document.getElementById('dateText').textContent = `${year}-${month}-${day} 星期${week}`;

            // 计算指针旋转角度
            const secondsDegrees = (seconds / 60) * 360;
            const minutesDegrees = (minutes / 60) * 360 + (seconds / 60) * 6;
            const hoursDegrees = ((hours % 12) / 12) * 360 + (minutes / 60) * 30;

            // 应用旋转
            secHand.style.transform = `translateX(-50%) rotate(${secondsDegrees}deg)`;
            minHand.style.transform = `translateX(-50%) rotate(${minutesDegrees}deg)`;
            hourHand.style.transform = `translateX(-50%) rotate(${hoursDegrees}deg)`;
        }

        // 初始化并每秒更新
        updateDateTime();
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
