<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人模块 Git 地址生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(26, 76, 127, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(26, 188, 156, 0.1) 0%, transparent 20%);
        }
        .header {
            background: linear-gradient(90deg, #1a237e, #0d47a1);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #1abc9c;
            box-shadow: 0 0 20px rgba(26, 188, 156, 0.3);
        }
        .header h1 {
            font-size: 28px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(26, 188, 156, 0.5);
        }
        .container {
            display: flex;
            max-width: 1400px;
            margin: 30px auto;
            gap: 30px;
            padding: 0 20px;
            flex-wrap: wrap;
        }
        .module-panel {
            width: 500px;
            background: rgba(13, 27, 42, 0.8);
            border: 1px solid #1abc9c;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(26, 188, 156, 0.2);
            height: fit-content;
        }
        .panel-title {
            color: #1abc9c;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2c3e50;
            font-size: 20px;
        }
        .module-table {
            width: 100%;
            border-collapse: collapse;
        }
        .module-table th,
        .module-table td {
            padding: 8px 6px;
            font-size: 15px;
        }
        .module-table th {
            color: #1abc9c;
            text-align: left;
            border-bottom: 1px solid #2c3e50;
        }
        .module-table td:last-child {
            color: #94a3b8;
            font-size: 13px;
        }
        .module-item:hover {
            background: rgba(26, 188, 156, 0.1);
        }
        .module-item input {
            width: 18px;
            height: 18px;
            accent-color: #1abc9c;
            cursor: pointer;
        }
        .module-item input:disabled {
            cursor: not-allowed;
        }
        .required-module {
            color: #ff9800;
            font-weight: bold;
        }
        .git-panel {
            flex: 1;
            min-width: 400px;
            background: rgba(13, 27, 42, 0.8);
            border: 1px solid #1abc9c;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(26, 188, 156, 0.2);
        }
        .git-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .git-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(26, 35, 126, 0.2);
            border: 1px solid #34495e;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .git-item:hover {
            border-color: #1abc9c;
            box-shadow: 0 0 8px rgba(26, 188, 156, 0.3);
        }
        .git-name {
            font-weight: 600;
            color: #1abc9c;
            min-width: 120px;
        }
        .git-url {
            flex: 1;
            padding: 0 15px;
            word-break: break-all;
            color: #ecf0f1;
        }
        .copy-btn {
            padding: 8px 16px;
            background: linear-gradient(45deg, #1abc9c, #16a085);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 60;
        }
        .copy-btn:hover {
            box-shadow: 0 0 10px rgba(26, 188, 156, 0.5);
        }
        .copy-btn.copied {
            background: #27ae60;
        }
        .empty-tip {
            text-align: center;
            padding: 50px 0;
            color: #7f8c8d;
            font-size: 18px;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .module-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 机器人模块 Git 地址生成器</h1>
    </div>
    <div class="container">
        <div class="module-panel">
            <h2 class="panel-title">模块选择</h2>
            <table class="module-table">
                <thead>
                    <tr>
                        <th>选</th>
                        <th>模块名称</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="moduleList"></tbody>
            </table>
        </div>
        <div class="git-panel">
            <h2 class="panel-title">Git 地址列表</h2>
            <div id="gitList" class="git-list">
                <div class="empty-tip">请勾选左侧模块查看对应Git地址</div>
            </div>
        </div>
    </div>

    <script>
        // 【完全保留你的原始数据，仅新增note字段】
        const moduleData = {
            "雷达": { git: "sonar", depends: [], note: "超声波避障" },
            "4位数码管": { git: "tm1650", depends: [], note: "数字显示" },
            "中文字库": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oledtft-wb.git", depends: [], note: "OLED/TFT汉字库" },
            "中文字库100": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oledtft-wb2.git", depends: [], note: "精简字库" },
            "遥控器": { git: "https://github.com/xiaoyaochun8/pxt-makerbit-ir-receiver.git", depends: [], note: "红外遥控接收" },
            "oled12864": { git: "https://github.com/xiaoyaochun8/OLED12864_I2C.git", depends: [], note: "0.96寸OLED屏" },
            "tft128160": { git: "https://github.com/xiaoyaochun8/pxt-RB-TFT1.8.git", depends: [], note: "1.8寸TFT彩屏" },
            "基础模块": { git: "https://github.com/xiaoyaochun8/pxt-mqlib.git", depends: [], required: true, note: "舵机、电机、红绿蓝黄灯、mp3、颜色识别" },
            "music": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-music.git", depends: [], note: "蜂鸣器音乐" },
            "tft中文": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-tft-cn.git", depends: ["tft128160","中文字库"], note: "TFT中文显示" },
            "tft图库": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-tft-arcade-pics.git", depends: ["tft128160"], note: "TFT图片库" },
            "tft表情": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-tft-faces.git", depends: ["tft128160"], note: "TFT表情动画" },
            "tft红绿灯": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-tft-tlight.git", depends: ["tft128160"], note: "红绿灯动画" },
            "oled中文": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled-cn.git", depends: ["中文字库"], note: "OLED中文显示" },
            "oled画画": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled-draw.git", depends: ["oled12864"], note: "OLED绘图" },
            "oled眼睛": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled-eyes.git", depends: ["oled12864"], note: "OLED眼睛动画" },
            "oled表情": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled-faces.git", depends: ["oled12864"], note: "OLED表情动画" },
            "oled雪人": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled-snowman.git", depends: ["oled12864"], note: "OLED雪人动画" },
            "oled图库": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled2.git", depends: ["oled12864"], note: "OLED图片库" },
            "oled面板库": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled4.git", depends: ["oled12864"], note: "OLED面板UI" },
            "oled动画库": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled5.git", depends: ["oled12864"], note: "OLED多动画" },
            "oled雷达动画": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-oled-anim-radar.git", depends: ["oled12864"], note: "雷达扫描动画" },
            "mp3": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-mp3.git", depends: [], note: "MP3播放模块" },
            "color": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-color-sensor.git", depends: [], note: "颜色传感器" },
            "wifi": { git: "https://github.com/xiaoyaochun8/pxt-mqlib-esp8266.git", depends: [], note: "wifi" }
        };

        const moduleListEl = document.getElementById("moduleList");
        const gitListEl = document.getElementById("gitList");

        // 渲染列表
        function renderModules() {
            moduleListEl.innerHTML = "";
            for (const [name, config] of Object.entries(moduleData)) {
                const tr = document.createElement("tr");
                tr.className = "module-item";

                const tdChk = document.createElement("td");
                const input = document.createElement("input");
                input.type = "checkbox";
                input.id = name;
                input.value = name;
                if (config.required) {
                    input.checked = true;
                    input.disabled = true;
                }
                input.addEventListener("change", handleChange);
                tdChk.appendChild(input);

                const tdName = document.createElement("td");
                tdName.textContent = name;

                const tdNote = document.createElement("td");
                tdNote.textContent = config.note || "";

                tr.append(tdChk, tdName, tdNote);
                moduleListEl.appendChild(tr);
            }
            updateAll();
        }

        // 一次更新所有状态（无递归）
        function updateAll() {
            // 1. 获取所有勾选
            const checked = new Set();
            document.querySelectorAll(".module-item input:checked").forEach(i => checked.add(i.value));

            // 2. 递归收集依赖（只算一次，不触发事件）
            function collectDeps(name) {
                const cfg = moduleData[name];
                if (!cfg) return;
                cfg.depends.forEach(dep => {
                    if (!checked.has(dep)) {
                        checked.add(dep);
                        collectDeps(dep);
                    }
                });
            }
            checked.forEach(name => collectDeps(name));

            // 3. 计算被依赖项
            const requiredByOthers = new Set();
            checked.forEach(mod => {
                (moduleData[mod]?.depends || []).forEach(dep => requiredByOthers.add(dep));
            });

            // 4. 统一设置勾选/禁用（不触发change）
            document.querySelectorAll(".module-item input").forEach(input => {
                const name = input.value;
                const cfg = moduleData[name];
                const need = checked.has(name);
                const isDep = requiredByOthers.has(name);

                input.checked = need;
                input.disabled = !!cfg.required || isDep;

                const nameTd = input.parentElement.nextElementSibling;
                if (cfg.required || isDep) nameTd.classList.add("required-module");
                else nameTd.classList.remove("required-module");
            });

            // 5. 更新Git列表
            updateGitList();
        }

        // 勾选变化入口（只调用一次updateAll）
        function handleChange() {
            updateAll();
        }

        function updateGitList() {
            const checked = Array.from(document.querySelectorAll(".module-item input:checked")).map(i => i.value);
            gitListEl.innerHTML = "";
            if (checked.length === 0) {
                gitListEl.innerHTML = '<div class="empty-tip">请勾选左侧模块查看对应Git地址</div>';
                return;
            }
            checked.forEach(name => {
                const item = moduleData[name];
                const div = document.createElement("div");
                div.className = "git-item";
                div.innerHTML = `
                    <div>
                        <div class="git-name">${name}</div>
                        <div class="git-url">${item.git}</div>
                    </div>
                    <button class="copy-btn" data-url="${item.git}">复制</button>
                `;
                gitListEl.appendChild(div);
            });
            bindCopy();
        }

        function bindCopy() {
            document.querySelectorAll(".copy-btn").forEach(btn => {
                btn.onclick = async () => {
                    const url = btn.dataset.url;
                    try {
                        await navigator.clipboard.writeText(url);
                        btn.textContent = "已复制";
                        btn.classList.add("copied");
                        setTimeout(() => {
                            btn.textContent = "复制";
                            btn.classList.remove("copied");
                        }, 2000);
                    } catch (err) {
                        alert("复制失败，请手动复制：\n" + url);
                    }
                };
            });
        }

        window.onload = renderModules;
    </script>
</body>
</html>
