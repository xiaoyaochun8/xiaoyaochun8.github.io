<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
 <meta http-equiv="Content-type" content="text/html;charset=utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=2.0, user-scalable=yes" />
 <title> Index Page </title>
 <style>
 * {border:solid 0px}
 #nav {height:10%;background:lightgreen}
 #nav #menu {font-size:48px;margin:8 8 auto}
 #nav #menu2 {font-size:48px;margin:8 8 auto;float:right}
 #main {}
 #main ol {overflow:hidden;list-style:none}
 #main ol li {height:100px;width:100px;background:#90cbee;float:left;margin:10px;}
 #main ol li .fa-paperclip {font-size:48px;margin-left:31%}
 #main ol li .name {font-size:20px;text-align:center;word-break:break-all;text-overflow:}
 </style>
 <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">
 <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.js"></script>
</head>
<body>
    <div id="nav">
        <div id="menu" class="fa fa-home"></div>
        <div id="menu2" class="fa fa-bars"></div>
    </div>
    <div id="main">
        <ol>
        </ol>
    </div>
    <script>
        $.get('data/index.json',function(data){
            var html = '';
            for(var i in data){
                html += '<li onclick="goto(\''+data[i]['url']+'\')">'
                    + '<div class="fa fa-paperclip"></div>'
                    + '<div class="name">'+data[i]['name']+'</div>'
                    + '</li>';
            }
            $('#main ol').html(html);
        })
        function goto(url){
            location.href = url
        }
    </script>
</body>
</html>
