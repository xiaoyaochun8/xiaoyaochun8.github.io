<!doctype html>
<html font-size="62.5%">
<head>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>test-index</title>
    <style>
        body {
            background:aliceblue;
            margin:0;
            padding:0;
            font-size:1.5rem;
        }
        .con {
            border:dotted 1px lightgray;
            background:lavender;
            height:100vh;
        }
        .title {
            border:dotted 1px lightgray;
            margin:0 auto;
            background:#e3fae7;
            display:flex;
            justify-content: space-around;
        }
        .nav {
            border:dotted 1px lightgray;
            margin:1rem auto;
            background:#e3fae7;
            display:flex;
            justify-content: space-around;
            cursor:pointer;
        }
        .list {
            border:dotted 1px lightgray;
            margin:3rem auto;
            background:#e3fae7;
            display:flex;
            justify-content: space-around;
        }
        .list .item {
            border:dotted 1px lightgray;
            width:30%;
            height:2rem;
            text-align:center;
            background:#afbee7;
            cursor:pointer;
            display:flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <script>
        function goTo(name){
            location.href = './'+name+'.html';
        }
        function goTo3(name){
            location.href = 'https://xiaoyaochun8.github.io/'+name+'.html';
        }
    </script>
</head>
<body>
    <div class="con">
        <div class="title">index</div>
        <div class="list">
            <div class="item" onclick="goTo3('qw/demos/font')">font</div>
            <div class="item" onclick="goTo('mytest')">mytest</div>
            <div class="item" onclick="goTo('mytest2')">mytest2</div>
        </div>
    </div>
</body>
</html>
